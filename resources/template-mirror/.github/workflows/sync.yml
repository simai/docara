name: Sync Docara starter mirror

on:
  workflow_dispatch:
    inputs:
      revision:
        description: Exact 40-character simai/docara commit SHA
        required: true
        type: string
      release:
        description: Exact SemVer release tag pointing at the revision
        required: true
        type: string
  repository_dispatch:
    types: [docara-template-sync]

permissions: {}

concurrency:
  group: docara-template-sync
  cancel-in-progress: false

jobs:
  generate:
    if: github.repository == 'simai/docara-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      revision: ${{ steps.revision.outputs.revision }}
      release: ${{ steps.revision.outputs.release }}
    steps:
      - name: Validate exact Docara revision
        id: revision
        env:
          REQUESTED_REVISION: ${{ inputs.revision || github.event.client_payload.revision }}
          REQUESTED_RELEASE: ${{ inputs.release || github.event.client_payload.release }}
        run: |
          if [[ ! "$REQUESTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'An exact 40-character Docara commit SHA is required.' >&2
            exit 1
          fi
          if [[ ! "$REQUESTED_RELEASE" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo 'An exact Docara SemVer release tag is required.' >&2
            exit 1
          fi
          printf 'revision=%s\n' "$REQUESTED_REVISION" >> "$GITHUB_OUTPUT"
          printf 'release=%s\n' "$REQUESTED_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Check out exact Docara source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: simai/docara
          ref: ${{ steps.revision.outputs.revision }}
          path: docara
          fetch-depth: 1
          persist-credentials: false

      - name: List release tags for exact revision
        env:
          REQUESTED_REVISION: ${{ steps.revision.outputs.revision }}
        run: |
          git ls-remote --tags https://github.com/simai/docara.git \
            | awk -v revision="$REQUESTED_REVISION" '$1 == revision && $2 ~ /^refs\/tags\/v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\^\{\})?$/ { sub(/\^\{\}$/, "", $2); print $2 }' \
            | LC_ALL=C sort -u > "$RUNNER_TEMP/matching-release-tags"

      - name: Verify release tag resolves to exact revision
        env:
          REQUESTED_RELEASE: ${{ steps.revision.outputs.release }}
          REQUESTED_REVISION: ${{ steps.revision.outputs.revision }}
        run: |
          test "$(wc -l < "$RUNNER_TEMP/matching-release-tags" | tr -d ' ')" = '1'
          test "$(sed 's#^refs/tags/##' "$RUNNER_TEMP/matching-release-tags")" = "$REQUESTED_RELEASE"
          git -C docara fetch --no-tags --depth 1 origin "refs/tags/$REQUESTED_RELEASE:refs/tags/$REQUESTED_RELEASE"
          test "$(git -C docara rev-parse "$REQUESTED_RELEASE^{commit}")" = "$REQUESTED_REVISION"

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45
        with:
          php-version: '8.2'
          coverage: none

      - name: Verify exact Composer release is resolvable
        env:
          REQUESTED_RELEASE: ${{ steps.revision.outputs.release }}
          REQUESTED_REVISION: ${{ steps.revision.outputs.revision }}
          COMPOSER_NO_INTERACTION: '1'
        working-directory: ${{ runner.temp }}
        run: |
          mkdir composer-release-check
          cd composer-release-check
          composer init --no-interaction --name=simai/docara-template-release-check
          composer require --no-update "simai/docara:$REQUESTED_RELEASE"
          composer update --no-install --no-plugins --no-scripts --no-interaction
          php "$GITHUB_WORKSPACE/docara/scripts/verify-composer-release.php" \
            composer.lock "$REQUESTED_RELEASE" "$REQUESTED_REVISION"

      - name: Generate and verify mirror without Composer
        env:
          DOCARA_REVISION: ${{ steps.revision.outputs.revision }}
        run: |
          destination="$RUNNER_TEMP/docara-template"
          mkdir -p "$destination"
          php docara/scripts/export-template.php "$destination" "$DOCARA_REVISION"
          php docara/scripts/verify-template.php "$destination" "$DOCARA_REVISION"

      - name: Upload generated mirror
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: docara-template-${{ steps.revision.outputs.revision }}
          path: ${{ runner.temp }}/docara-template
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  propose:
    if: github.repository == 'simai/docara-template'
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      DOCARA_REVISION: ${{ needs.generate.outputs.revision }}
      DOCARA_RELEASE: ${{ needs.generate.outputs.release }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      SYNC_BRANCH: docara-sync-${{ needs.generate.outputs.revision }}
    steps:
      - name: Download generated mirror
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: docara-template-${{ needs.generate.outputs.revision }}
          path: generated

      - name: Verify artifact against exact canonical Git objects
        run: |
          test -n "$DEFAULT_BRANCH"
          test ! -L generated
          if find generated ! -type d ! -type f -print -quit | grep -q .; then
            echo 'Generated mirror can contain regular files and directories only.' >&2
            exit 1
          fi

          git init --quiet canonical
          git -C canonical remote add origin https://github.com/simai/docara.git
          git -C canonical fetch --quiet --depth 1 origin "$DOCARA_REVISION"
          test "$(git -C canonical rev-parse FETCH_HEAD)" = "$DOCARA_REVISION"

      - name: List release tags before write
        run: |
          git ls-remote --tags https://github.com/simai/docara.git \
            | awk -v revision="$DOCARA_REVISION" '$1 == revision && $2 ~ /^refs\/tags\/v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\^\{\})?$/ { sub(/\^\{\}$/, "", $2); print $2 }' \
            | LC_ALL=C sort -u > "$RUNNER_TEMP/propose-matching-release-tags"

      - name: Verify release tag before write
        run: |
          test "$(wc -l < "$RUNNER_TEMP/propose-matching-release-tags" | tr -d ' ')" = '1'
          test "$(sed 's#^refs/tags/##' "$RUNNER_TEMP/propose-matching-release-tags")" = "$DOCARA_RELEASE"
          git -C canonical fetch --quiet --no-tags --depth 1 origin "refs/tags/$DOCARA_RELEASE:refs/tags/$DOCARA_RELEASE"
          test "$(git -C canonical rev-parse "$DOCARA_RELEASE^{commit}")" = "$DOCARA_REVISION"

      # The write-capable job runs only this trusted workflow body. It never
      # executes PHP or scripts from the fetched source or downloaded artifact.
      - name: Reconstruct exact canonical manifest
        shell: python
        run: |
          import hashlib
          import json
          import os
          import re
          import subprocess

          revision = os.environ['DOCARA_REVISION']
          destination = os.path.join(os.environ['RUNNER_TEMP'], 'reconstructed-manifest')

          def git(*arguments):
              return subprocess.check_output(['git', '-C', 'canonical', *arguments])

          files = {}
          for prefix in ('stubs/portable', 'resources/template-mirror'):
              tree = git('ls-tree', '-r', '-z', revision, '--', prefix)
              for raw_entry in tree.split(b'\0'):
                  if not raw_entry:
                      continue
                  metadata, raw_source = raw_entry.split(b'\t', 1)
                  mode, kind, _object_id = metadata.decode('ascii').split(' ')
                  source = raw_source.decode('utf-8')
                  relative = source[len(prefix) + 1:]
                  if mode != '100644' or kind != 'blob':
                      raise SystemExit(f'Unsupported canonical Git mode: {source}')
                  if not re.fullmatch(r'[A-Za-z0-9._-]+(?:/[A-Za-z0-9._-]+)*', relative):
                      raise SystemExit(f'Unsafe canonical path: {source}')
                  segments = relative.split('/')
                  if any(segment in ('.', '..') or segment.lower() == '.git' for segment in segments):
                      raise SystemExit(f'Reserved canonical path: {source}')
                  if relative == 'docara-template-mirror.json' or relative in files:
                      raise SystemExit(f'Canonical mirror path collision: {relative}')
                  contents = git('show', f'{revision}:{source}')
                  if source == 'resources/template-mirror/README.md':
                      placeholder = b'{{DOCARA_PACKAGE_VERSION}}'
                      if contents.count(placeholder) != 1:
                          raise SystemExit('Template mirror README must contain one package-version placeholder.')
                      contents = contents.replace(placeholder, os.environ['DOCARA_RELEASE'].encode('ascii'))
                  files[relative] = {
                      'mode': mode,
                      'sha256': hashlib.sha256(contents).hexdigest(),
                      'source': source,
                  }

          if not files:
              raise SystemExit('Canonical mirror payload is empty.')
          required_support = {
              '.github/workflows/sync.yml': 'resources/template-mirror/.github/workflows/sync.yml',
              '.gitignore': 'resources/template-mirror/.gitignore',
              'README.md': 'resources/template-mirror/README.md',
          }
          for relative, source in required_support.items():
              if files.get(relative, {}).get('source') != source:
                  raise SystemExit(f'Required support contract is missing: {source}')
          manifest = {
              'contract_version': 1,
              'files': files,
              'generated_from': {
                  'repository': 'simai/docara',
                  'revision': revision,
                  'package_version': os.environ['DOCARA_RELEASE'],
                  'starter': 'stubs/portable',
                  'support_tree': git('rev-parse', f'{revision}:resources/template-mirror').decode().strip(),
                  'tree': git('rev-parse', f'{revision}:stubs/portable').decode().strip(),
              },
              'schema': 'docara.template_mirror.v1',
          }
          with open(destination, 'w', encoding='utf-8', newline='\n') as stream:
              json.dump(manifest, stream, ensure_ascii=False, indent=4, sort_keys=True)
              stream.write('\n')

      - name: Verify reconstructed manifest and artifact files
        run: |
          cmp "$RUNNER_TEMP/reconstructed-manifest" generated/docara-template-mirror.json
          test "$(stat -c '%a' generated/docara-template-mirror.json)" = '644'

          test "$(jq -r '.schema' generated/docara-template-mirror.json)" = 'docara.template_mirror.v1'
          test "$(jq -r '.contract_version' generated/docara-template-mirror.json)" = '1'
          test "$(jq -r '.generated_from.revision' generated/docara-template-mirror.json)" = "$DOCARA_REVISION"
          test "$(jq -r '.generated_from.package_version' generated/docara-template-mirror.json)" = "$DOCARA_RELEASE"
          test "$(jq -r '.generated_from.repository' generated/docara-template-mirror.json)" = 'simai/docara'
          test "$(jq -r '.generated_from.starter' generated/docara-template-mirror.json)" = 'stubs/portable'
          test "$(jq -r '.generated_from.tree' generated/docara-template-mirror.json)" = "$(git -C canonical rev-parse "$DOCARA_REVISION:stubs/portable")"
          test "$(jq -r '.generated_from.support_tree' generated/docara-template-mirror.json)" = "$(git -C canonical rev-parse "$DOCARA_REVISION:resources/template-mirror")"

          find generated -type f -print \
            | sed 's#^generated/##' \
            | grep -v '^docara-template-mirror.json$' \
            | LC_ALL=C sort > "$RUNNER_TEMP/actual-files"
          jq -r '.files | keys[]' generated/docara-template-mirror.json \
            | LC_ALL=C sort > "$RUNNER_TEMP/manifest-files"
          cmp "$RUNNER_TEMP/manifest-files" "$RUNNER_TEMP/actual-files"

          git -C canonical ls-tree -r --name-only "$DOCARA_REVISION" -- stubs/portable resources/template-mirror \
            | awk 'index($0,"stubs/portable/")==1 {print substr($0,16) "\t" $0} index($0,"resources/template-mirror/")==1 {print substr($0,27) "\t" $0}' \
            | LC_ALL=C sort > "$RUNNER_TEMP/canonical-sources"
          jq -r '.files | to_entries[] | [.key, .value.source] | @tsv' generated/docara-template-mirror.json \
            | LC_ALL=C sort > "$RUNNER_TEMP/manifest-sources"
          cmp "$RUNNER_TEMP/canonical-sources" "$RUNNER_TEMP/manifest-sources"

          while IFS=$'\t' read -r relative source expected expected_mode; do
            test -f "generated/$relative"
            artifact_hash="$(sha256sum "generated/$relative" | awk '{print $1}')"
            if [ "$source" = 'resources/template-mirror/README.md' ]; then
              canonical_hash="$expected"
            else
              canonical_hash="$(git -C canonical show "$DOCARA_REVISION:$source" | sha256sum | awk '{print $1}')"
            fi
            artifact_mode="$(stat -c '%a' "generated/$relative")"
            test "$artifact_hash" = "$expected"
            test "$canonical_hash" = "$expected"
            test "100$artifact_mode" = "$expected_mode"
          done < <(jq -r '.files | to_entries[] | [.key, .value.source, .value.sha256, .value.mode] | @tsv' generated/docara-template-mirror.json)

      - name: Clone public mirror without credentials
        run: git clone --depth 1 --branch "$DEFAULT_BRANCH" "https://github.com/${GITHUB_REPOSITORY}.git" mirror

      - name: Commit generated drift only
        id: commit
        working-directory: mirror
        run: |
          rsync -a --delete --exclude='.git/' ../generated/ ./
          git add --all
          if git diff --cached --quiet; then
            echo 'propose=false' >> "$GITHUB_OUTPUT"
            echo 'push=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          remote_sha=''
          if git ls-remote --exit-code --heads origin "refs/heads/$SYNC_BRANCH" > "$RUNNER_TEMP/sync-branch"; then
            remote_sha="$(awk '{print $1}' "$RUNNER_TEMP/sync-branch")"
            git fetch --quiet --depth 1 origin "refs/heads/$SYNC_BRANCH:refs/remotes/origin/$SYNC_BRANCH"
          fi
          echo "remote-sha=$remote_sha" >> "$GITHUB_OUTPUT"
          echo 'propose=true' >> "$GITHUB_OUTPUT"
          desired_tree="$(git write-tree)"
          if [ -n "$remote_sha" ] && [ "$(git rev-parse "refs/remotes/origin/$SYNC_BRANCH^{tree}")" = "$desired_tree" ]; then
            echo 'push=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name 'docara-template-bot'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m "Sync starter from simai/docara $DOCARA_REVISION"
          echo 'push=true' >> "$GITHUB_OUTPUT"

      - name: Publish generated pull request
        if: steps.commit.outputs.propose == 'true'
        working-directory: mirror
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REMOTE_SHA: ${{ steps.commit.outputs.remote-sha }}
          PUSH_REQUIRED: ${{ steps.commit.outputs.push }}
        run: |
          if [ "$PUSH_REQUIRED" = 'true' ]; then
            auth="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
            if [ -n "$REMOTE_SHA" ]; then
              git -c http.extraheader="AUTHORIZATION: basic $auth" push \
                --force-with-lease="refs/heads/$SYNC_BRANCH:$REMOTE_SHA" \
                origin "HEAD:refs/heads/$SYNC_BRANCH"
            else
              git -c http.extraheader="AUTHORIZATION: basic $auth" push origin "HEAD:refs/heads/$SYNC_BRANCH"
            fi
          fi
          if [ "$(gh pr list --state open --head "$SYNC_BRANCH" --json number --jq 'length')" != '0' ]; then
            exit 0
          fi
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$SYNC_BRANCH" \
            --title "Sync starter from simai/docara $DOCARA_REVISION" \
            --body "Generated from exact reviewed Docara revision $DOCARA_REVISION. Verify the manifest and checks before merging."
