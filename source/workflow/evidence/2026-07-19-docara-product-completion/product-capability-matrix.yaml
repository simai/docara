schema: docara.product_capability_matrix.v1
date: "2026-07-19"
baseline_revision: "31f468be85d015b962fccc2b4c089204aab1410b"
purpose: >-
  Goal acceptance projection. This is not a second Framework registry; each
  record must be proven from native Markdown, an exact Framework contract, a
  Docara recipe/generated feature and executable evidence.
projection_state: implementation_complete_pending_unified_exact_acceptance
status_legend:
  pass: required final outcome, valid only with the unified exact-candidate verdict
  bounded: useful baseline exists but the required product contract is incomplete
  required_missing: required by this Goal and not yet implemented/accepted
  deferred: explicit non-goal with a reason
field_semantics:
  baseline: historical state at baseline_revision
  target: required state evaluated by the unified exact-candidate acceptance
